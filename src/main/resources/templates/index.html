<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cupcake Shop</title>
    <link rel="stylesheet" href="/public/css/styles.css" />
</head>
<body>

<!-- NAVBAR -->
<nav>
    <!-- VENSTRE: logo -->
    <a href="/" style="display: block; line-height: 0; border: none;">
    <img src="/public/images/olskerlogo.png" alt="Olsker Cupcakes" style="height: 60px; display: block;" />
    </a>
    <!-- HØJRE: login/bruger info -->
    <div>
        <span th:if="${session.currentUser == null}">
            <a class="nav-btn" href="/login">Log ind</a>
        </span>
        <span th:if="${session.currentUser != null}" style="margin-right:20px;">
            👤 <span th:text="${session.currentUser.email}"></span>
            &nbsp;|&nbsp;
            💰 <span th:text="${session.currentUser.balance + ' kr'}"></span>
        </span>
        <a class="nav-btn" th:if="${session.currentUser != null}" href="/logout">Log ud</a>
    </div>
</nav>
<div class="banner">
    <img src="/public/images/cupcakelogo.png" alt="Olsker Cupcakes" />
</div>

<!-- HERO -->
<div class="hero">
    <h1>Velkommen til Cupcake Shop</h1>
    <p>Byg din egen cupcake med de lækreste bunde og toppings</p>
    <a class="build-btn" href="/build">Byg din cupcake nu →</a>
</div>

<!-- LOGIN OG REGISTRER — vises KUN hvis ikke logget ind -->
<div class="auth-section" th:if="${session.currentUser == null}">
    <div class="card">
        <h2>Log ind</h2>
        <p class="error" th:if="${loginError}" th:text="${loginError}"></p>
        <form action="/login" method="post">
            <label>Email</label>
            <input type="email" name="email" placeholder="din@email.dk" required />
            <label>Adgangskode</label>
            <input type="password" name="password" placeholder="••••••••" required />
            <button type="submit">Log ind</button>
        </form>
    </div>

    <div class="card">
        <h2>Opret konto</h2>
        <p class="error" th:if="${registerError}" th:text="${registerError}"></p>
        <form action="/register" method="post">
            <label>Email</label>
            <input type="email" name="email" placeholder="din@email.dk" required />
            <label>Adgangskode</label>
            <input type="password" name="password" placeholder="••••••••" required />
            <button type="submit">Opret konto</button>
        </form>
    </div>
</div>

</body>

</html>
