<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/public/css/styles.css" />
    <style>

    </style>
</head>
<body>

<nav>
    <a href="/" style="display: block; line-height: 0; border: none;">
        <img src="/public/images/olskerlogo.png" alt="Olsker Cupcakes" style="height: 60px; display: block;" />
    </a>
    <div>
        <span style="color:white; margin-right:20px;">
             <span th:text="${session.currentUser.email}"></span>
        </span>
        <a class="nav-btn" href="/logout">Log ud</a>
    </div>
</nav>

<div class="content">
    <h1>Admin Panel</h1>

    <div class="admin-section">
        <h2> Brugere</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Saldo</th>
                <th>Rolle</th>
                <th>Tilføj credits</th>
                <th>Slet</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.userId}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.balance + ' kr'}"></td>
                <td>
                    <span class="badge badge-admin" th:if="${user.role == 'admin'}">Admin</span>
                    <span class="badge badge-user" th:if="${user.role == 'user'}">Bruger</span>
                </td>
                <td>
                    <form class="inline-form" action="/admin/add-balance" method="post">
                        <input type="hidden" name="userId" th:value="${user.userId}" />
                        <input type="number" name="amount" placeholder="kr" min="1" required />
                        <button class="btn-add" type="submit">Tilføj</button>
                    </form>
                </td>
                <td>
                    <form action="/admin/delete-user" method="post">
                        <input type="hidden" name="userId" th:value="${user.userId}" />
                        <button class="btn-delete" type="submit"
                                onclick="return confirm('Er du sikker?')">Slet</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>


    <div class="admin-section">
        <h2> Ordrer</h2>
        <table>
            <thead>
            <tr>
                <th>Ordre ID</th>
                <th>Kunde</th>
                <th>Total</th>
                <th>Status</th>
                <th>Opdater status</th>
                <th>Slet</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td>
                    <a th:href="@{/admin/order/{id}(id=${order[0]})}"
                       style="color: #e89ab8;"
                       th:text="${order[0]}">
                    </a>
                </td>
                <td th:text="${order[1]}"></td>
                <td th:text="${order[2] + ' kr'}"></td>
                <td>
                <span class="badge"
                      th:classappend="${order[3] == 'klar til afhentning'} ? 'badge-admin' : 'badge-user'"
                      th:text="${order[3]}">
                </span>
                </td>
                <td>
                    <form class="inline-form" action="/admin/update-order-status" method="post">
                        <input type="hidden" name="orderId" th:value="${order[0]}" />
                        <input type="hidden" name="status" value="klar til afhentning" />
                        <button class="btn-add" type="submit">✓ Klar til afhentning</button>
                    </form>
                </td>
                <td>
                    <form action="/admin/delete-order" method="post">
                        <input type="hidden" name="orderId" th:value="${order[0]}" />
                        <button class="btn-delete" type="submit"
                                onclick="return confirm('Er du sikker på du vil slette denne ordre?')">Slet</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
