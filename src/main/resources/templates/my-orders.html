<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mine ordrer</title>
    <link rel="stylesheet" href="/public/css/styles.css" />
</head>
<body>

<nav>
    <a href="/" style="display: block; line-height: 0; border: none;">
        <img src="/public/images/olskerlogo.png" alt="Olsker Cupcakes" style="height: 60px; display: block;" />
    </a>
    <div>
        <span th:if="${session.currentUser != null}" style="margin-right:20px;">
             <span th:text="${session.currentUser.email}"></span>
            &nbsp;|&nbsp;
             <span th:text="${session.currentUser.balance + ' kr'}"></span>
        </span>
        <a class="nav-btn" th:if="${session.currentUser != null && session.currentUser.admin}" href="/admin" style="margin-right:8px;">Admin</a>
        <a class="nav-btn" th:if="${session.currentUser != null}" href="/logout">Log ud</a>
    </div>
</nav>

<div class="content">
    <h1>Mine ordrer</h1>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <div class="admin-section">
        <div th:if="${#lists.isEmpty(orders)}">
            <p class="empty-cart">Du har ingen ordrer endnu.</p>
        </div>

        <table th:if="${not #lists.isEmpty(orders)}">
            <thead>
            <tr>
                <th>Ordre ID</th>
                <th>Total</th>
                <th>Status</th>
                <th>Se detaljer</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order[0]}"></td>
                <td th:text="${order[1] + ' kr'}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${order[2] == 'klar til afhentning'} ? 'badge-admin' : 'badge-user'"
                          th:text="${order[2]}">
                    </span>
                </td>
                <td>
                    <a th:href="@{/my-orders/{id}(id=${order[0]})}"
                       style="color: #e89ab8;">Se detaljer</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
